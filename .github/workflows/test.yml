name: Run Python tests

on:
  push:
    branches:
      - main
      - master
      - dev
      - "dev/**"
  pull_request:
    branches:
      - main
      - master
      - dev
      - "dev/**"

jobs:
  build:
    if: >-
      github.event_name != 'push' ||
      contains(github.event.head_commit.message, 'bump(release)') == false
    name: Run tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Nox
        run: python -m pip install "nox>=2025.5.1"
      - uses: pavelzw/pytest-action@510c5e90c360a185039bea56ce8b3e7e51a16507
        with:
          emoji: true
          verbose: false
          job-summary: true
          report-title: Pytest report for Python ${{ matrix.python-version }}
          custom-pytest: >-
            nox --non-interactive --session tests-${{ matrix.python-version }} --
            --md=reports/pytest-${{ matrix.python-version }}.md --emoji
